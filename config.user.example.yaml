# ==============================================================================
# 配置文件 (Config.yaml) - 单细胞 RNA-seq 分析流程
# ==============================================================================

# 注意：建议所有路径均使用绝对路径 (Absolute Paths)，以避免运行时的路径混淆。

# ------------------------------------------------------------------------------
# 1. 样本路径配置 (Samples)
# ------------------------------------------------------------------------------
# 格式: 样本名称: "10x/Alevin 输出目录的绝对路径"
# 支持 10x 格式 (matrix.mtx.gz) 或 Alevin 格式 (quants_mat.mtx)
samples:
  S1: "/home/user/PanChongshi/Projects/CKG/data/YW_s1/outs/filtered_feature_bc_matrix"
  S2: "/home/user/PanChongshi/Projects/CKG/data/YW_s2/outs/filtered_feature_bc_matrix"
  S3: "/home/user/PanChongshi/Projects/CKG/data/YW_s3/outs/filtered_feature_bc_matrix"
  IL12_1: "/home/user/PanChongshi/Projects/CKG/data/YW_121/outs/filtered_feature_bc_matrix"
  IL12_2: "/home/user/PanChongshi/Projects/CKG/data/YW_122/outs/filtered_feature_bc_matrix"
  IL12_3: "/home/user/PanChongshi/Projects/CKG/data/YW_123/outs/filtered_feature_bc_matrix"
  IL12p_1: "/home/user/PanChongshi/Projects/CKG/data/YW_12p1/outs/filtered_feature_bc_matrix"
  IL12p_2: "/home/user/PanChongshi/Projects/CKG/data/YW_12p2/outs/filtered_feature_bc_matrix"
  IL12p_3: "/home/user/PanChongshi/Projects/CKG/data/YW_12p3/outs/filtered_feature_bc_matrix"

# ------------------------------------------------------------------------------
# 2. 样本元数据 (Sample Metadata)
# ------------------------------------------------------------------------------
# 用于定义每个样本的分组、时间点或其他实验条件。
# 键名必须与 `samples` 中的样本名称严格一致。
sample_metadata:
  S1:
    group: "Control"
  S2:
    group: "Control"
  S3:
    group: "Control"
  IL12_1:
    group: "IL12"
  IL12_2:
    group: "IL12"
  IL12_3:
    group: "IL12"
  IL12p_1:
    group: "IL12p"
  IL12p_2:
    group: "IL12p"
  IL12p_3:
    group: "IL12p"

# ------------------------------------------------------------------------------
# 3. 输出目录配置 (Output Directories)
# ------------------------------------------------------------------------------
directories:
  raw_h5ad: "/home/user/PanChongshi/Projects/CKG/Analysis/1_Matrix2Marker/results/data/single_sample_raw"
  qc_h5ad:  "/home/user/PanChongshi/Projects/CKG/Analysis/1_Matrix2Marker/results/data/single_sample_qc"
  merged:   "/home/user/PanChongshi/Projects/CKG/Analysis/1_Matrix2Marker/results/data/merged"
  plots:    "/home/user/PanChongshi/Projects/CKG/Analysis/1_Matrix2Marker/results/plots"
  tables:   "/home/user/PanChongshi/Projects/CKG/Analysis/1_Matrix2Marker/results/tables"
  logs:     "/home/user/PanChongshi/Projects/CKG/Analysis/1_Matrix2Marker/results/logs"
  report:   "/home/user/PanChongshi/Projects/CKG/Analysis/1_Matrix2Marker/results/report"

# ------------------------------------------------------------------------------
# 4. 过滤参数 (Filtering)
# ------------------------------------------------------------------------------
# 用于 `02_qc_filter_single.py` 脚本中的质量控制步骤。
filtering:
  min_genes: 200          # 每个细胞最少检测到的基因数
  max_mt_pct: 10.0        # 允许的最大线粒体基因比例 (%)
  min_cells_per_gene: 3   # 每个基因最少在多少个细胞中表达才被保留

  # Doublet (双胞) 检测参数 - 使用 Scrublet
  doublet_rate: 0.06      # 预期的双胞率 (Expected doublet rate), 通常 10x 数据约为 0.05 - 0.10
  sim_doublet_ratio: 2.0  # 模拟双胞的数量相对于观测细胞数的倍数
  n_prin_comps: 30        # Scrublet 内部 PCA 使用的主成分数

# ------------------------------------------------------------------------------
# 5. 基因模式匹配 (Gene Patterns)
# ------------------------------------------------------------------------------
# 用于在高变基因 (HVG) 选择后，剔除特定类型的基因。
gene_patterns:
  mt: "^MT-"                     # 线粒体基因 (Mouse: ^MT-, Human: ^MT-)
  rp: "^RP[SL]"                  # 核糖体蛋白基因 (Ribosomal Protein)
  ncrna: "^[A-Z][A-Z][0-9].*\\.[0-9]" # ncRNA / 未定性基因
  linc: "(^LOC|LINC)[1-9]*"      # 长链非编码 RNA (LINC) 或 LOC 基因

# ------------------------------------------------------------------------------
# 6. 分析处理参数 (Processing)
# ------------------------------------------------------------------------------
# 用于 `03_merge_and_process.py` 脚本中的合并、归一化、降维和聚类步骤。
processing:
  n_top_genes: 2000       # 选择的高变基因 (HVG) 数量
  harmony_key: "sample"   # 用于 Harmony 去批次的列名
  resolution: 0.5         # Leiden 聚类的分辨率
  
  # 归一化与缩放
  target_sum: 10000       # 归一化总计数目标
  scale_max_value: 10.0   # Scale 数据时的最大截断值
  
  # 邻居图构建 (Neighbors)
  n_neighbors: 10         # 计算 UMAP/聚类时的近邻数 (k-NN)

# ------------------------------------------------------------------------------
# 7. 差异基因分析参数 (Find Markers)
# ------------------------------------------------------------------------------
# 用于 `04_find_markers.py` 脚本
find_markers:
  groupby: "leiden"       # 进行差异分析的分组列名 (例如: leiden, group, sample)
  method: "wilcoxon"      # 检验方法 (wilcoxon, t-test, t-test_overestim_var, logreg)
  n_genes: 20            # 输出表格中每个组保留的基因数量
  n_genes_plot: 5         # 绘图 (Dotplot/Matrixplot) 时每个组展示的 Top 基因数量